<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remover Usuário</title>

    <style>
        body{font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;}

        .container{background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);}

        h2{color: #d9534f;}

        button{padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;}

        .btn-remover{background-color: #d9534f;
            color: white;}

        .btn-cancelar{background-color: #6c757d;
            color: white;}

        .btn-remover:hover{background-color: #c9302c;}

        .btn-cancelar:hover{background-color: #5a6268;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Remover Usuário</h2>
        <p>Tem certeza que deseja remover este usuário?</p>
        <button class="btn-remover">Remover</button>
        <button class="btn-cancelar">Cancelar</button>
    </div>

</body>
</html>
